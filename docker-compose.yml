version: '3.8'

services:
  mongodb:
    image: mongo:6-jammy
    container_name: greenbasket_db
    ports:
      - "27017:27017"
    volumes:
      - greenbasket_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: greenbasket_backend
    ports:
      - "5000:5000"
    # Load secrets from .env file (not committed to git)
    env_file:
      - .env
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/greenbasket
      - NODE_ENV=production
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: greenbasket_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  greenbasket_data:
